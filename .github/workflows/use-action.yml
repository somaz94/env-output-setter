name: Smoke Test (Released Action)

on:
  workflow_dispatch:
    inputs:
      run:
        description: 'workflow run'
        required: true
        default: 'true'
  workflow_run:
    workflows: ["Create release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  smoke-test-basic:
    name: Smoke Test (Basic)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Environment and Output Variables
        id: set_variables
        uses: somaz94/env-output-setter@v1
        with:
          env_key: GCP_REGION,AWS_REGION
          env_value: asia-northeast1,us-east-1
          output_key: GCP_OUTPUT,AWS_OUTPUT
          output_value: gcp_success,aws_success

      - name: Verify Results
        run: |
          echo "Env: GCP_REGION=${{ env.GCP_REGION }}, AWS_REGION=${{ env.AWS_REGION }}"
          echo "Out: GCP_OUTPUT=${{ steps.set_variables.outputs.GCP_OUTPUT }}, AWS_OUTPUT=${{ steps.set_variables.outputs.AWS_OUTPUT }}"
          if [ "${{ env.GCP_REGION }}" != "asia-northeast1" ] || [ "${{ env.AWS_REGION }}" != "us-east-1" ]; then
            echo "[FAIL]Environment variables not set correctly"
            exit 1
          fi
          if [ "${{ steps.set_variables.outputs.GCP_OUTPUT }}" != "gcp_success" ]; then
            echo "[FAIL]Output variables not set correctly"
            exit 1
          fi
          echo "[PASS]Basic env/output test passed"

  smoke-test-options:
    name: Smoke Test (Options)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test with Custom Delimiter and Options
        id: set_variables
        uses: somaz94/env-output-setter@v1
        with:
          env_key: "KEY1::KEY2"
          env_value: "value1::value2"
          output_key: "OUT1::OUT2"
          output_value: "output1::output2"
          delimiter: '::'
          trim_whitespace: true
          fail_on_empty: true

      - name: Verify Results
        run: |
          if [ "${{ env.KEY1 }}" != "value1" ] || [ "${{ env.KEY2 }}" != "value2" ]; then
            echo "[FAIL]Custom delimiter test failed"
            exit 1
          fi
          echo "[PASS]Custom delimiter test passed"

  smoke-test-multiline:
    name: Smoke Test (Multiline)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Multiline Input
        id: test_multi
        uses: somaz94/env-output-setter@v1
        with:
          env_key: |
            MULTI_KEY1,
            MULTI_KEY2,
            MULTI_KEY3
          env_value: |
            first value,
            second value,
            third value
          output_key: |
            OUT_MULTI1,
            OUT_MULTI2,
            OUT_MULTI3
          output_value: |
            output one,
            output two,
            output three

      - name: Verify Results
        run: |
          echo "MULTI_KEY1=${{ env.MULTI_KEY1 }}, MULTI_KEY2=${{ env.MULTI_KEY2 }}, MULTI_KEY3=${{ env.MULTI_KEY3 }}"
          echo "OUT_MULTI1=${{ steps.test_multi.outputs.OUT_MULTI1 }}"
          echo "[PASS]Multiline input test passed"

  smoke-test-transform:
    name: Smoke Test (Transform)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Value Transformation
        id: set_variables
        uses: somaz94/env-output-setter@v1
        with:
          env_key: URL_PARAM,UPPER_VAL
          env_value: hello world,test
          output_key: STATUS,VERSION
          output_value: active,v1.0
          to_upper: true
          encode_url: true
          mask_secrets: true
          mask_pattern: '(password|secret).*'

      - name: Verify Results
        run: |
          echo "URL_PARAM=${{ env.URL_PARAM }}"
          echo "UPPER_VAL=${{ env.UPPER_VAL }}"
          echo "STATUS=${{ steps.set_variables.outputs.STATUS }}"
          echo "[PASS]Transform test passed"

  smoke-test-json:
    name: Smoke Test (JSON)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test JSON Support
        id: json_test
        uses: somaz94/env-output-setter@v1
        with:
          env_key: CONFIG_JSON
          env_value: '{"api_url":"https://api.example.com","timeout":30}'
          output_key: config_data
          output_value: '{"api_url":"https://api.example.com","timeout":30}'
          json_support: true
          group_prefix: CONFIG
          debug_mode: true

      - name: Verify Results
        run: |
          echo "CONFIG_JSON=${{ env.CONFIG_JSON }}"
          echo "config_data=${{ steps.json_test.outputs.config_data }}"
          echo "[PASS]JSON support test passed"
